live_config_reload = true

[colors]
draw_bold_text_with_bright_colors = true

#[colors.bright]
#black = "0x72696a"
#blue = "0xf38d70"
#cyan = "0x85dacc"
#green = "0xadda78"
#magenta = "0xa8a9eb"
#red = "0xfd6883"
#white = "0xfff1f3"
#yellow = "0xf9cc6c"

#[colors.normal]
#black = "0x2c2525"
#blue = "0xf38d70"
#cyan = "0x85dacc"
#green = "0xadda78"
#magenta = "0xa8a9eb"
#red = "0xfd6883"
#white = "0xfff1f3"
#yellow = "0xf9cc6c"

#[colors.primary]
#background = "0x2D2A2E"
#foreground = "0xfff1f3"

[font]
size = 12

[font.normal]
#family = "CaskaydiaCove Nerd Font"
family = "JetbrainsMono Nerd Font"

[font.bold]
#family = "CaskaydiaCove Nerd Font"
family = "JetbrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
#family = "CaskaydiaCove Nerd Font"
family = "JetbrainsMono Nerd Font"
style = "Bold Italic"

[font.italic]
#family = "JetbrainsMono Nerd Font"
family = "JetbrainsMono Nerd Font"
style = "Italic"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = false

[shell]
program = "/usr/bin/zsh"

[window]
padding = { x = 0, y = 0 }
opacity = 0.90

#[window.class]
#general = "Alacritty"
#instance = "Alacritty"

[cursor]
style = { shape = "Underline", blinking = "On" }

